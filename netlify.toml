# Netlify deployment config for Split 2.0.
[build]
  command = "npm run build"
  publish = "dist"

# Single-page app: every route is handled client-side by React Router, so any
# direct hit (e.g. /person/abc on a refresh) must be served index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
