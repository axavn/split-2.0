<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- viewport-fit=cover lets the app paint behind the iPhone notch/home
         indicator when installed; CSS safe-area insets pad things back in. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#111113" />
    <meta
      name="description"
      content="Splitly — track shared expenses and running balances with the people you split bills with."
    />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- iOS "Add to Home Screen" support: Safari ignores most of the
         manifest and reads these instead. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Splitly" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&family=Dongle:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <title>Splitly</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
